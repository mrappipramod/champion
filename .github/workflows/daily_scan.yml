name: Daily Stock Screener

on:
  schedule:
    - cron: "30 0 * * 1-5"    # 6:00 AM IST — pre-market
    - cron: "15 10 * * 1-5"   # 3:45 PM IST — post-close
  workflow_dispatch:
    inputs:
      cap:
        description: "Cap segment"
        required: false
        default: "all"
        type: choice
        options: [all, largecap, midcap, smallcap]
      trade:
        description: "Trade type"
        required: false
        default: "all"
        type: choice
        options: [all, longterm, swing, intraday]
      min_score:
        description: "Min score (0-100)"
        required: false
        default: "55"
        type: string
      single_stock:
        description: "Single stock symbol (e.g. TCS)"
        required: false
        default: ""
        type: string
      triggered_by:
        description: "manual | schedule"
        required: false
        default: "manual"
        type: string
      supabase_run_id:
        description: "Supabase run ID to update status"
        required: false
        default: ""
        type: string
      user_id:
        description: "Supabase user ID for result attribution"
        required: false
        default: ""
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          # Notifications
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS:    ${{ secrets.TELEGRAM_CHAT_IDS }}
          EMAIL_SENDER:         ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:       ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:      ${{ secrets.EMAIL_RECIPIENT }}
          # Supabase
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_USER_ID:     ${{ inputs.user_id || '' }}
          SUPABASE_RUN_ID:      ${{ inputs.supabase_run_id || '' }}
          # Run context
          TRIGGERED_BY:         ${{ inputs.triggered_by || 'schedule' }}
          SCREENER_CAP:         ${{ inputs.cap || 'all' }}
          SCREENER_TRADE:       ${{ inputs.trade || 'all' }}
          SCREENER_MIN_SCORE:   ${{ inputs.min_score || '55' }}
          SINGLE_STOCK:         ${{ inputs.single_stock || '' }}
        run: |
          if [ -n "$SINGLE_STOCK" ]; then
            python main.py --single-stock "$SINGLE_STOCK"
          else
            python main.py \
              --cap "$SCREENER_CAP" \
              --trade "$SCREENER_TRADE" \
              --min-score "$SCREENER_MIN_SCORE" \
              --max 150 \
              --workers 5
          fi
